<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação de Segurança</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #eef1f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    color: #0a2450;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 4px 24px rgba(10, 36, 80, 0.06);
    text-align: center;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .logo-text {
    text-align: left;
    line-height: 1.1;
  }

  .logo-text .top {
    font-size: 13px;
    font-weight: 500;
    color: #0a2450;
    letter-spacing: 0.2px;
  }

  .logo-text .bottom {
    font-size: 22px;
    font-weight: 700;
    color: #0a2450;
    letter-spacing: -0.5px;
    margin-top: 2px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    color: #0a2450;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 15px;
    color: #6b7a99;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 28px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  .checkbox-container {
    border: 1px solid #d8dee9;
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #ffffff;
    user-select: none;
  }

  .checkbox-container:hover {
    border-color: #b5c0d4;
  }

  .checkbox-container.checked {
    border-color: #0a2450;
    background: #f4f6fb;
  }

  .checkbox-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border: 1.5px solid #c4ccdb;
    border-radius: 4px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .checkbox-container.checked .checkbox {
    background: #0a2450;
    border-color: #0a2450;
  }

  .checkbox svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .checkbox-container.checked .checkbox svg {
    opacity: 1;
  }

  .checkbox-label {
    font-size: 15px;
    font-weight: 500;
    color: #0a2450;
  }

  .verify-text {
    font-size: 13px;
    color: #8a94a8;
    font-weight: 400;
  }

  .button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: #c8cdd6;
    color: #ffffff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: not-allowed;
    transition: all 0.2s ease;
    margin-bottom: 20px;
  }

  .button.active {
    background: #0a2450;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(10, 36, 80, 0.25);
  }

  .button.active:hover {
    background: #081b3d;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(10, 36, 80, 0.3);
  }

  .footer {
    font-size: 13px;
    color: #8a94a8;
    font-weight: 400;
  }

  .loading {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid #e5e9f0;
    border-top-color: #0a2450;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .checkbox-container.loading-state .loading {
    display: block;
  }

  .checkbox-container.loading-state .checkbox {
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 480px) {
    .card {
      padding: 36px 24px;
    }
    h1 { font-size: 21px; }
    .subtitle { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <!-- Sombra embaixo -->
      <ellipse cx="24" cy="38" rx="18" ry="1.5" fill="#0a2450" opacity="0.1"/>
      
      <!-- Corpo principal do carro -->
      <path d="M 6 30 
               L 8 24 
               Q 9 22, 11 22 
               L 14 22 
               L 17 16 
               Q 18 14, 20 14 
               L 28 14 
               Q 30 14, 31 16 
               L 34 22 
               L 37 22 
               Q 39 22, 40 24 
               L 42 30 
               Q 42 33, 39 33 
               L 9 33 
               Q 6 33, 6 30 Z" 
            fill="#0a2450"/>
      
      <!-- Janelas (vidro azul claro) -->
      <path d="M 18 16 
               Q 19 15, 20 15 
               L 28 15 
               Q 29 15, 30 16 
               L 33 22 
               L 15 22 Z" 
            fill="#7fb3e8" opacity="0.95"/>
      
      <!-- Divisória das janelas -->
      <line x1="24" y1="15.5" x2="24" y2="22" stroke="#0a2450" stroke-width="0.8"/>
      
      <!-- Farol dianteiro (amarelo) -->
      <circle cx="9" cy="27" r="1.5" fill="#ffcb05"/>
      
      <!-- Lanterna traseira (vermelha) -->
      <circle cx="39" cy="27" r="1.5" fill="#e63946"/>
      
      <!-- Roda dianteira -->
      <circle cx="14" cy="33" r="4.5" fill="#1a2744"/>
      <circle cx="14" cy="33" r="2.5" fill="#4a5875"/>
      <circle cx="14" cy="33" r="1" fill="#1a2744"/>
      
      <!-- Roda traseira -->
      <circle cx="34" cy="33" r="4.5" fill="#1a2744"/>
      <circle cx="34" cy="33" r="2.5" fill="#4a5875"/>
      <circle cx="34" cy="33" r="1" fill="#1a2744"/>
      
      <!-- Detalhe da lateral -->
      <line x1="20" y1="27" x2="28" y2="27" stroke="#1e4d8c" stroke-width="0.8" opacity="0.6"/>
    </svg>
    <div class="logo-text">
      <div class="top"></div>
      <div class="bottom">DIGITAL</div>
    </div>
  </div>

  <h1>Verificação de Segurança</h1>
  <p class="subtitle">Por favor, confirme que você não é um robô para continuar.</p>

  <div class="checkbox-container" id="checkboxContainer">
    <div class="checkbox-left">
      <div class="checkbox">
        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 7L5.5 10.5L12 3.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="loading"></div>
      <span class="checkbox-label">Não sou um robô</span>
    </div>
    <span class="verify-text">Verificação</span>
  </div>

  <button class="button" id="accessButton" disabled>Acessar Conteúdo</button>

  <p class="footer">Protegido por verificação de segurança</p>
</div>

<script>
  const container = document.getElementById('checkboxContainer');
  const button = document.getElementById('accessButton');
  let verified = false;

  container.addEventListener('click', () => {
    if (verified) return;

    container.classList.add('loading-state');

    setTimeout(() => {
      container.classList.remove('loading-state');
      container.classList.add('checked');
      button.classList.add('active');
      button.disabled = false;
      verified = true;
    }, 1200);
  });

  button.addEventListener('click', () => {
    if (!verified) return;
    // Redirecionamento - substitua pelo seu link de destino
    window.location.href = 'https://flowpedagio.vercel.app/';
  });
</script>

</body>
</html>
